site_name: Riku
site_description: The smallest PaaS you've ever seen (Rust edition)
site_author: Rakibul Yeasin
site_url: https://dreygur.github.io/riku

repo_name: dreygur/riku
repo_url: https://github.com/dreygur/riku

# Documentation source directory
docs_dir: docs/docs

# Site output directory
site_dir: docs/site

theme:
  name: material
  palette:
    # Dark is the hard default (listed first); toggle reveals light mode.
    - scheme: slate
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  # Match the dashboard: system sans for UI, JetBrains Mono for code
  # (JetBrains Mono is loaded via stylesheets/extra.css).
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.tooltips
  language: en
  logo: img/logo.svg
  favicon: img/favicon.svg

# Custom navigation
nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: quick-start.md
      - Installation: installation.md
  - Guides:
      - Addons: addons.md
      - Backup & Restore: backup-restore.md
      - Rollback: rollback.md
      - Dashboard: dashboard.md
      - Doctor: doctor.md
      - Marketplace: marketplace.md
  - Reference:
      - CLI: cli.md
      - Environment Variables: env.md
      - Runtimes: runtimes.md
      - Nginx: nginx.md
      - Supervisor: supervisor.md
      - Resource Limits: resource-limits.md
      - Plugins (legacy): plugins.md
      - Plugin Bundles: plugin-bundles.md
      - Plugin Gallery: plugin-gallery.md
      - AI Agents: ai-agents.md
      - Systemd: systemd.md
  - FAQ: faq.md
  - GitHub: https://github.com/dreygur/riku

# Extensions
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: dreygur
      repo: riku
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true

# Custom styling
extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dreygur/riku
      name: Riku on GitHub
  generator: false

copyright: >
  Made with Rust 🦀 — Riku is MIT licensed.

# Validation
validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
  nav:
    omitted_files: info
