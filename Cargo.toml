[package]
name = "riku"
version = "0.1.0"
edition = "2021"
description = "The smallest PaaS you've ever seen — in Rust"

[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"
tera = "1"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
nix = { version = "0.29", features = ["signal", "process", "user", "fs"] }
notify = "7"
regex = "1"
colored = "2"
log = "0.4"
env_logger = "0.11"
which = "7"
glob = "0.3"
dirs = "5"

[dev-dependencies]
tempfile = "3"

[profile.release]
lto = true
strip = true
codegen-units = 1
