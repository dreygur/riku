# cargo-deny configuration for supply chain security
# https://github.com/EmbarkStudios/cargo-deny

[advisories]
# Deny crates with security vulnerabilities
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "workspace"
yanked = "deny"
ignore = [
    # Add specific advisories to ignore here if needed (with justification)
]

[licenses]
# Ensure all dependencies use acceptable licenses
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "0BSD",
]
deny = [
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-3.0",
]
copyleft = "warn"
allow-osi-fsf-free = "neither"
default = "deny"
confidence-threshold = 0.8

[bans]
# Deny multiple versions of the same crate
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
# Deny specific crates
deny = [
    # Add crates to ban here
]

# Skip checking these crates for multiple versions
skip = [
    # Build dependencies often have multiple versions
]

skip-tree = [
    # Skip entire dependency trees if needed
]

[sources]
# Only allow crates from crates.io
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
