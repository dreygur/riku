# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Deny crates with known security vulnerabilities unless explicitly ignored.
ignore = []

[licenses]
# Only allow crates with these licenses.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "0BSD",
]
# Confidence threshold for license detection (0.0 - 1.0).
confidence-threshold = 0.8

[bans]
# Warn on multiple versions of the same crate.
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
# Only allow crates from crates.io.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
