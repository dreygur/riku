# Static nginx site for the riku demo container.
#
# - dashboard.localhost routes to the Next.js/Hono dashboard (started by
#   entrypoint.sh on 127.0.0.1:3100, never exposed directly).
# - Everything else falls through to the catch-all default server, except
#   per-app Host headers, which match one of riku's own generated configs
#   below (included from ~/.riku/nginx/*.conf, same as the automated test
#   target — see ../production_audit/container/riku-nginx.conf).
#
# *.localhost needs no DNS/hosts-file entry: virtually every modern OS and
# browser resolves it to 127.0.0.1 on its own (see run_demo.sh banner).

server {
    listen 80;
    listen [::]:80;
    server_name dashboard.localhost;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE (the deploy-log tail) needs the connection kept open and
        # unbuffered, not nginx's default proxy buffering.
        proxy_buffering off;
        proxy_set_header Connection "";
        proxy_read_timeout 1h;
    }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html index.htm;
    server_name _;

    location /nginx-health {
        return 200 "nginx-ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

include /home/riku/.riku/nginx/*.conf;
