# Static nginx site for the Riku test container.
# Mirrors contrib/nginx/default.conf's pattern: a default server block plus
# an include of Riku's per-app generated configs from ~/.riku/nginx/*.conf.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/html;
    index index.html index.htm;
    server_name _;

    location /nginx-health {
        return 200 "nginx-ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}

include /home/riku/.riku/nginx/*.conf;
