name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: riku-linux-amd64
            deps: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: riku-linux-arm64
            deps: "gcc-aarch64-linux-gnu"
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            artifact: riku-linux-armv7
            deps: "gcc-arm-linux-gnueabihf"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: riku-macos-amd64
            deps: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: riku-macos-arm64
            deps: ""

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        target: ${{ matrix.target }}

    - name: Install cross-compilation dependencies
      if: matrix.deps != ''
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.deps }}

    - name: Configure cross-compilation
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
        mkdir -p .cargo
        cat >> .cargo/config.toml << EOF
        [target.aarch64-unknown-linux-gnu]
        linker = "aarch64-linux-gnu-gcc"
        EOF

    - name: Configure cross-compilation
      if: matrix.target == 'armv7-unknown-linux-gnueabihf'
      run: |
        mkdir -p .cargo
        cat >> .cargo/config.toml << EOF
        [target.armv7-unknown-linux-gnueabihf]
        linker = "arm-linux-gnueabihf-gcc"
        EOF

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ matrix.target }}-cargo-

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Strip binary (native only)
      if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin'
      run: strip target/${{ matrix.target }}/release/riku

    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: target/${{ matrix.target }}/release/riku
        retention-days: 30

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create release archives
      run: |
        cd artifacts
        for dir in */; do
          cd "$dir"
          tar -czvf ../${dir%/}.tar.gz riku
          sha256sum ../${dir%/}.tar.gz > ../${dir%/}.sha256
          cd ..
        done
        ls -la

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          artifacts/*.tar.gz
          artifacts/*.sha256
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
