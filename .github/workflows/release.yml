name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: riku-linux-amd64
            deps: ''
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: riku-linux-arm64
            deps: gcc-aarch64-linux-gnu
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            artifact: riku-linux-armv7
            deps: gcc-arm-linux-gnueabihf
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: riku-macos-amd64
            deps: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: riku-macos-arm64
            deps: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - name: Install cross-compilation dependencies
        if: matrix.deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.deps }}

      - name: Configure cross-compilation (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Configure cross-compilation (ARMv7)
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.armv7-unknown-linux-gnueabihf]
          linker = "arm-linux-gnueabihf-gcc"
          EOF

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binaries (native only)
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-apple-darwin' || matrix.target == 'x86_64-apple-darwin'
        run: |
          strip target/${{ matrix.target }}/release/riku
          strip target/${{ matrix.target }}/release/riku-plugin-java
          strip target/${{ matrix.target }}/release/riku-plugin-clojure
          strip target/${{ matrix.target }}/release/riku-plugin-container

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/riku
          retention-days: 30

      # Binary runtime plugins (downloaded by `riku install-plugins java|clojure|container`,
      # see src/cli/apps/install_plugins.rs) — uploaded per-target so the CLI can fetch the
      # right one for the host triple from `releases/latest/download/riku-plugin-<name>-<target>`.
      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v4
        with:
          name: riku-plugin-bundle-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/riku-plugin-java
            target/${{ matrix.target }}/release/riku-plugin-clojure
            target/${{ matrix.target }}/release/riku-plugin-container
          retention-days: 30

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archives
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [[ "$name" == riku-plugin-bundle-* ]]; then
              # Binary runtime plugins: ship raw (no tar.gz) so install_plugins.rs
              # can fetch+chmod them directly, matching the shell-plugin download path.
              target="${name#riku-plugin-bundle-}"
              for bin in "$dir"riku-plugin-*; do
                asset="riku-plugin-$(basename "$bin" | sed 's/^riku-plugin-//')-${target}"
                cp "$bin" "$asset"
                sha256sum "$asset" > "$asset.sha256"
              done
            else
              tar -czvf "${name}.tar.gz" -C "$dir" riku
              sha256sum "${name}.tar.gz" > "${name}.sha256"
            fi
          done
          rm -rf */
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
