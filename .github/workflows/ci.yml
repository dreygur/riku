name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: CI (mise run ci)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins the channel; this guarantees the rustfmt and
      # clippy components are present for the pinned stable.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Installs mise and the helper tools declared in mise.toml
      # (nextest, llvm-cov, audit, deny); caches them between runs.
      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # fmt:check + lint + build + test + test:doc + audit + deny.
      - name: Run CI pipeline
        run: mise run ci

      - name: Build release
        run: mise run build:release

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx

      - name: Build
        run: cargo build --release

      - name: Run deployment tests
        run: |
          chmod +x tests/deploy/test-all.sh
          ./tests/deploy/test-all.sh

      - name: Run quick test
        run: |
          chmod +x tests/deploy/quick-test.sh
          ./tests/deploy/quick-test.sh test-node node

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [ci, integration]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Create release archive
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar -czvf riku-${{ github.ref_name }}.tar.gz riku
          sha256sum riku-${{ github.ref_name }}.tar.gz > riku-${{ github.ref_name }}.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/x86_64-unknown-linux-gnu/release/riku-*.tar.gz
            target/x86_64-unknown-linux-gnu/release/riku-*.sha256
          generate_release_notes: true
          draft: false
