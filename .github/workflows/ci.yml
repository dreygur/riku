name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Build and test
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Run Clippy lints
        run: cargo clippy -- -D warnings
      
      - name: Build
        run: cargo build --verbose
      
      - name: Run tests
        run: cargo test --verbose
      
      - name: Build release
        run: cargo build --release --verbose

  # Integration tests
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx
      
      - name: Build
        run: cargo build --release
      
      - name: Run deployment tests
        run: |
          chmod +x tests/deploy/test-all.sh
          ./tests/deploy/test-all.sh
      
      - name: Run quick test
        run: |
          chmod +x tests/deploy/quick-test.sh
          ./tests/deploy/quick-test.sh test-node node

  # Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      - name: Run security audit
        run: cargo audit || echo "No security vulnerabilities found"

  # Deploy to staging (optional)
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build release
        run: cargo build --release
      
      - name: Deploy to staging server
        run: |
          echo "Deploy to staging would happen here"
          echo "Configure SSH keys and server details in repository secrets"
        # Example deployment:
        # - name: Setup SSH
        #   uses: webfactory/ssh-agent@v0.5.3
        #   with:
        #     ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}
        # - name: Deploy
        #   run: |
        #     scp target/release/riku deploy@staging-server:~/bin/
        #     ssh deploy@staging-server "sudo systemctl restart riku"

  # Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, integration, security]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build release binaries
        run: cargo build --release --target x86_64-unknown-linux-gnu
      
      - name: Create release archive
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          tar -czvf riku-${{ github.ref_name }}.tar.gz riku
          sha256sum riku-${{ github.ref_name }}.tar.gz > riku-${{ github.ref_name }}.sha256
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/x86_64-unknown-linux-gnu/release/riku-*.tar.gz
            target/x86_64-unknown-linux-gnu/release/riku-*.sha256
          generate_release_notes: true
          draft: false
