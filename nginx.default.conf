# Default Nginx Configuration for Riku
# This is a template - Riku generates app-specific configs automatically

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    # SSL configuration (uncomment for production)
    # listen 443 ssl default_server;
    # listen [::]:443 ssl default_server;
    # ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    # ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;

    root /var/www/html;
    index index.html index.htm;
    server_name _;

    location / {
        try_files $uri $uri/ =404;
    }
}

# Include Riku-generated app configurations
include /home/piku/.riku/nginx/*.conf;
