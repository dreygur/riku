# Official Riku plugin marketplace — this repository is itself a marketplace.
#
# Register it on a server with:
#   riku plugins marketplace add github:dreygur/riku
# Then discover and install:
#   riku plugins search postgres
#   riku plugins add sqlite-volume

[[plugin]]
name        = "sqlite-volume"
source      = "examples/plugins/sqlite-volume"
description = "Persistent SQLite database file on a managed volume (no external services)"
type        = "addon"

[[plugin]]
name        = "postgres"
source      = "examples/plugins/postgres"
description = "Managed PostgreSQL database and role on the host"
type        = "addon"

[[plugin]]
name        = "redis"
source      = "examples/plugins/redis"
description = "Managed Redis instance via per-instance ACL users"
type        = "addon"

[[plugin]]
name        = "caddy-router"
source      = "examples/plugins/caddy-router"
description = "Route apps through Caddy with automatic HTTPS (swaps the built-in nginx router)"
type        = "router"

[[plugin]]
name        = "webhook-notify"
source      = "examples/plugins/webhook-notify"
description = "POST lifecycle events to a webhook"
type        = "notifier"
