<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c2410c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#grad)"/>
  
  <!-- R - Main vertical with curve -->
  <path d="M55 145 L55 55 L75 55 C95 55 95 80 75 80 L65 80 L95 110" 
        stroke="white" stroke-width="8" fill="none" 
        stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- I - Simple vertical line connecting to K -->
  <path d="M100 55 L100 145" 
        stroke="white" stroke-width="8" 
        stroke-linecap="round"/>
  
  <!-- K - Connected to I -->
  <path d="M100 100 L130 70 M100 100 L130 130 M130 70 L145 55 M130 130 L145 145" 
        stroke="white" stroke-width="8" fill="none" 
        stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Speed lines suggesting motion -->
  <line x1="40" y1="40" x2="55" y2="40" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <line x1="35" y1="60" x2="50" y2="60" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
</svg>
