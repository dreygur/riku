<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="riku-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- R - Starting curve -->
  <path d="M20 90 
           C20 90, 20 30, 50 30 
           C70 30, 80 45, 80 60 
           C80 75, 70 90, 50 90 
           L50 90 
           L85 120" 
        fill="none" stroke="url(#riku-gradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- I - Vertical line -->
  <path d="M120 30 L120 120" 
        fill="none" stroke="url(#riku-gradient)" stroke-width="24" stroke-linecap="round"/>
  
  <!-- K - Diagonal strokes -->
  <path d="M160 30 L160 120 
           M160 75 L200 30 
           M160 75 L210 120" 
        fill="none" stroke="url(#riku-gradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- U - Bottom curve -->
  <path d="M250 30 L250 90 
           C250 110, 270 110, 290 90 
           L290 30" 
        fill="none" stroke="url(#riku-gradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
