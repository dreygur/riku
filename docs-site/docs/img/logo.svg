<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="copyleft-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#copyleft-gradient)" stroke-width="12"/>
  
  <!-- Reversed C (copyleft symbol) -->
  <path d="M130 60 
           C100 60, 80 80, 80 100 
           C80 120, 100 140, 130 140" 
        fill="none" stroke="url(#copyleft-gradient)" stroke-width="12" 
        stroke-linecap="round"/>
  
  <!-- RIKU text below -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="url(#copyleft-gradient)" text-anchor="middle" letter-spacing="4">RIKU</text>
</svg>
